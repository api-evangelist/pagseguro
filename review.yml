  notes:
    - Tier-1 Brazilian payment processor (UOL spinoff; NYSE PAGS).
    - Public REST API covering Orders, Charges, Public Keys, Checkout, Recurring, Connect, Accounts, EDI, Certificates, Webhooks.
    - Official SDKs in PHP, Java, Ruby, .NET plus WooCommerce / Magento / PrestaShop plugins and PlugPag terminal integration.
    - Pricing surface is dominated by per-transaction MDR / Pix / boleto fees rather than per-API-call billing; plans.yml and finops.yml reflect this.
