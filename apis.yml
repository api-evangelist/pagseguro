aid: pagseguro
name: PagSeguro / PagBank
description: >-
  PagSeguro (operating consumer-facing under the PagBank brand) is one of
  Brazil's largest payment processors and digital-banking platforms. Originally
  spun out of UOL (Universo Online) and listed on the NYSE under PAGS, the
  company offers an end-to-end financial stack covering online payments,
  in-person card acceptance via the Moderninha and Minizinha terminal
  families, Pix instant payments, boleto, credit and debit cards, recurring
  subscriptions, marketplace split, payouts, account-as-a-service, and a
  digital bank with cards, credit, and investments. Its developer portal at
  developer.pagbank.com.br exposes a REST API surface (Orders, Charges,
  Public Keys, Checkout, Recurring, Connect/OAuth, Account Registration,
  EDI, Webhooks) backed by official SDKs in PHP, Java, Ruby, and .NET, plus
  WooCommerce, Magento/Adobe Commerce, and PrestaShop plugins.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
access: 3rd-Party
position: Producer
