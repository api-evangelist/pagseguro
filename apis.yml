apis:
  - aid: pagseguro:orders
    name: PagBank Orders API
    description: >-
      Core REST surface for creating and managing orders and their associated
      charges across credit card, debit card with 3DS, boleto, and Pix. Covers
      capture, cancel, refund, fees retrieval, and stored-card validation.
    humanURL: https://developer.pagbank.com.br/reference/criar-pedido
    baseURL: https://api.pagseguro.com
    tags:
      - Orders
      - Payments
      - Refunds
      - 3DS
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
      - type: APIReference
        url: https://developer.pagbank.com.br/reference/introducao
  - aid: pagseguro:checkout
    name: PagBank Checkout & Payment Link API
    description: >-
      Hosted checkout and shareable payment-link generation. Merchants create,
      activate, deactivate, and retrieve checkouts; PagBank renders the UI,
      handles payment-method selection and 3DS, and returns the buyer to the
      merchant on completion.
    humanURL: https://developer.pagbank.com.br/docs/checkout
    baseURL: https://api.pagseguro.com
    tags:
      - Checkout
      - Hosted
      - Payment Links
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/checkout
  - aid: pagseguro:public-keys
    name: PagBank Public Keys API
    description: >-
      Issues the public keys used for client-side card encryption in PagBank's
      transparent checkout. Lets merchants tokenise card data in the browser
      so raw PAN never reaches their servers.
    humanURL: https://developer.pagbank.com.br/reference/criar-uma-chave-publica
    baseURL: https://api.pagseguro.com
    tags:
      - Tokenization
      - Encryption
      - PCI
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:recurring
    name: PagBank Recurring / Subscriptions API
    description: >-
      Recurring-billing surface with plans, subscribers, subscriptions,
      invoices, coupons, refunds, and retry management. Supports activate,
      suspend, cancel, and per-subscriber payment-method updates.
    humanURL: https://developer.pagbank.com.br/reference/criar-plano-recorrente
    baseURL: https://api.pagseguro.com
    tags:
      - Subscriptions
      - Recurring
      - Plans
      - Invoices
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:pix
    name: PagBank Pix API
    description: >-
      Pix (Brazilian Central Bank instant-payment rail) charge creation and
      collection. Supports QR-code generation, due-date Pix (Pix Cobrança), and
      payment status retrieval, integrated into the Orders flow.
    humanURL: https://developer.pagbank.com.br/reference/criar-um-pedido-pix
    baseURL: https://api.pagseguro.com
    tags:
      - Pix
      - Instant Payments
      - QR
      - Brazil
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:boleto
    name: PagBank Boleto API
    description: >-
      Boleto Bancário issuance and collection. Generates a printable / scannable
      boleto tied to an Order, with status callbacks once the buyer pays at a
      bank, lottery house, or via internet banking.
    humanURL: https://developer.pagbank.com.br/reference/criar-pedido-com-boleto
    baseURL: https://api.pagseguro.com
    tags:
      - Boleto
      - Brazil
      - Collections
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:split
    name: PagBank Marketplace / Split API
    description: >-
      Payment-division (split) settlement for marketplaces and platforms.
      Splits a single charge across multiple receivers (with optional custody
      / release control) so each seller is settled directly by PagBank.
    humanURL: https://developer.pagbank.com.br/reference/criar-pedido-com-split
    baseURL: https://api.pagseguro.com
    tags:
      - Marketplace
      - Split
      - Settlement
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:connect
    name: PagBank Connect / OAuth API
    description: >-
      OAuth-style authorisation surface that lets a third-party application
      act on behalf of a PagBank account holder. Includes SMS and challenge
      verification, access-token issuance, refresh, and revoke.
    humanURL: https://developer.pagbank.com.br/docs/connect
    baseURL: https://api.pagseguro.com
    tags:
      - OAuth
      - Authorization
      - Connect
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/connect
  - aid: pagseguro:accounts
    name: PagBank Account Registration API
    description: >-
      Lets PagBank partners create and query merchant accounts on behalf of
      third parties — the on-ramp for platforms that want to onboard sub-merchants
      into the PagBank ecosystem.
    humanURL: https://developer.pagbank.com.br/docs/cadastro-de-clientes
    baseURL: https://api.pagseguro.com
    tags:
      - Onboarding
      - Sub Merchants
      - KYC
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:edi
    name: PagBank EDI API
    description: >-
      Electronic Data Interchange surface for downloading transaction and
      settlement statements for reconciliation — a structured replacement for
      manual CSV/PDF statement processing.
    humanURL: https://developer.pagbank.com.br/docs/edi
    baseURL: https://api.pagseguro.com
    tags:
      - EDI
      - Reconciliation
      - Statements
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:certificates
    name: PagBank Digital Certificate (mTLS) API
    description: >-
      Issues digital certificates for mTLS authentication, layered on top of
      bearer-token auth for higher-trust integrations and sensitive payouts /
      Pix Bacen flows.
    humanURL: https://developer.pagbank.com.br/docs/certificado-digital
    baseURL: https://api.pagseguro.com
    tags:
      - mTLS
      - Security
      - Certificates
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/apis-pagbank
  - aid: pagseguro:webhooks
    name: PagBank Webhooks / Notifications
    description: >-
      Event-driven notifications for order, charge, subscription, refund, and
      checkout state changes. Webhooks are signed so receivers can verify
      authenticity end-to-end.
    humanURL: https://developer.pagbank.com.br/docs/webhooks
    baseURL: customer-configured
    tags:
      - Webhooks
      - Events
      - Notifications
    properties:
      - type: Documentation
        url: https://developer.pagbank.com.br/docs/webhooks
